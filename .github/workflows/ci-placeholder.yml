name: CI Placeholder

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate foundation files
        shell: bash
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f .editorconfig
          test -f .gitignore
          test -f docs/adr/ADR-0000-template.md
          test -f infra/compose/docker-compose.yml
          test -f implementation-notes/README.md
