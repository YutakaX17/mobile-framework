name: Docker Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker Build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mobile-framework-backend
            context: backend
          - image: mobile-framework-frontend-admin
            context: frontend-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build image
        run: docker build --tag ${{ matrix.image }}:ci ${{ matrix.context }}
