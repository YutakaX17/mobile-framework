name: Python Lint And Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-lint-test:
    name: Python Lint And Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install contract dependencies
        run: python -m pip install -r contracts/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Validate Python sources
        run: python tools/validate_python.py

      - name: Validate contracts
        run: python contracts/validate_contracts.py

      - name: Validate backend tests
        run: python tools/validate_backend.py

      - name: Validate workflow builder coverage
        run: python tools/validate_workflow_builder.py
