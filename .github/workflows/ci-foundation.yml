name: CI Foundation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-foundation:
    name: Validate Foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install contract dependencies
        run: python -m pip install -r contracts/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Validate repository foundation
        run: python tools/validate_foundation.py

      - name: Validate contracts
        run: python contracts/validate_contracts.py

      - name: Validate backend scaffold
        run: python tools/validate_backend.py

  validate-rust-extension:
    name: Validate Rust Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Rust extension
        run: python tools/validate_rust_ext.py --include-python-wrapper

  validate-frontend-admin:
    name: Validate Frontend Admin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install frontend admin dependencies
        working-directory: frontend-admin
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend-admin
        run: npx playwright install --with-deps chromium

      - name: Validate frontend admin
        run: python tools/validate_frontend_admin.py

  validate-mobile-runtime:
    name: Validate Mobile Runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate mobile scaffold
        run: python tools/validate_mobile.py

      - name: Validate mobile runtime test coverage
        run: python tools/validate_mobile_tests.py
