name: CI Foundation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-foundation:
    name: Validate Foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install contract dependencies
        run: python -m pip install -r contracts/requirements.txt

      - name: Validate repository foundation
        run: python tools/validate_foundation.py

      - name: Validate contracts
        run: python contracts/validate_contracts.py
