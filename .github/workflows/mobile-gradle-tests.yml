name: Mobile Gradle Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mobile-gradle-tests:
    name: Mobile Gradle Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Validate mobile scaffold
        run: python tools/validate_mobile.py

      - name: Validate mobile runtime test coverage
        run: python tools/validate_mobile_tests.py

      - name: Run mobile Gradle tests
        working-directory: mobile
        run: gradle :shared:desktopTest :composeApp:desktopTest --stacktrace
